<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stipt Techniek – Rooster</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b27;--card:#1c2235;--border:#252d45;
  --accent:#f97316;--accent2:#fb923c;
  --text:#e2e8f0;--muted:#556080;--white:#fff;
  --green:#22c55e;--gbg:#0f2318;--gb:#166534;
  --purple:#a78bfa;--pbg:#1e1535;--pb:#5b21b6;
  --blue:#60a5fa;--bbg:#0f1d35;--bb:#1d4ed8;
  --red:#ef4444;--obg:#1a0f06;--ob:#9a3412;--orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:2px solid var(--accent);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.35rem;color:#fff;letter-spacing:1px;}
.logo em{color:var(--accent);font-style:normal;}
.topbar-right{display:flex;align-items:center;gap:8px;}
#admin-badge{display:none;background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;padding:3px 9px;border-radius:4px;letter-spacing:.5px;}
#logout-btn{display:none;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;padding:4px 10px;border-radius:4px;cursor:pointer;}
#logout-btn:hover{border-color:var(--red);color:var(--red);}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;gap:0;overflow-x:auto;}
.tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.4px;padding:11px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover{color:var(--text);}

/* VIEWS */
.view{display:none;padding:14px 12px 60px;max-width:720px;margin:0 auto;}
.view.active{display:block;}

/* ── GENERIC ── */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.4px;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{font-size:.78rem;padding:5px 10px;}
.btn-danger{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.75rem;padding:4px 9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;border-radius:5px;transition:all .15s;}
.btn-danger:hover{border-color:var(--red);color:var(--red);}

.tbadge{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap;}
.t-asbest{background:#7f1d1d;color:#fca5a5;}
.t-sloop{background:#713f12;color:#fde68a;}
.t-doedag{background:#1e3a5f;color:#93c5fd;}

.kt-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:1px;background:#0d2010;border:1px solid var(--gb);color:#86efac;padding:1px 6px;border-radius:3px;margin-left:5px;}

/* ════════════════════════════════════
   LOGIN SCHERM
════════════════════════════════════ */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;align-items:center;justify-content:center;}
#login-screen.open{display:flex;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:92%;max-width:360px;text-align:center;}
.login-box h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;margin-bottom:4px;}
.login-box p{color:var(--muted);font-size:.84rem;margin-bottom:20px;}
.login-box input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:7px;font-size:1rem;font-family:'Barlow',sans-serif;margin-bottom:10px;text-align:center;letter-spacing:2px;}
.login-box input:focus{outline:none;border-color:var(--accent);}
#login-error{color:var(--red);font-size:.8rem;margin-bottom:8px;min-height:18px;}

/* ════════════════════════════════════
   MEDEWERKER – naam kiezen
════════════════════════════════════ */
.picker-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0;text-align:center;}
.picker-wrap h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;color:#fff;margin-bottom:4px;}
.picker-wrap p{color:var(--muted);font-size:.86rem;margin-bottom:20px;}
.name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;width:100%;}
.name-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;padding:13px 10px;border-radius:9px;cursor:pointer;transition:all .15s;text-align:center;width:100%;}
.name-btn:hover,.name-btn:active{border-color:var(--accent);color:var(--accent);background:#1f1510;}
.name-btn.admin-btn{border-color:var(--purple);color:var(--purple);}
.name-btn.admin-btn:hover{background:var(--pbg);}

/* ════════════════════════════════════
   MEDEWERKER – eigen rooster
════════════════════════════════════ */
.back-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.86rem;padding:6px 12px;border-radius:6px;cursor:pointer;margin-bottom:12px;transition:all .15s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.datum-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}

.eigen-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;animation:fadeUp .25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.ec-head{background:linear-gradient(90deg,#1a2040,var(--card));padding:12px 14px;border-bottom:1px solid var(--border);}
.ec-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.ec-code{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;color:var(--accent);}
.ec-og{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;}
.ec-loc{font-size:.83rem;color:var(--muted);}
.ec-loc strong{color:var(--text);}
.ec-body{padding:10px 14px;}
.ib{border-radius:7px;padding:9px 12px;margin-bottom:8px;}
.ib-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.67rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;}
.ib-uitv{background:var(--pbg);border:1px solid var(--pb);}
.ib-uitv .ib-lbl{color:var(--purple);}
.ib-werk{background:var(--bbg);border:1px solid var(--bb);}
.ib-werk .ib-lbl{color:var(--blue);}
.ib-opm{background:var(--gbg);border:1px solid var(--gb);}
.ib-opm .ib-lbl{color:var(--green);}
.ib-start{background:var(--obg);border:1px solid var(--ob);}
.ib-start .ib-lbl{color:var(--orange);}
.ib-coll{background:var(--surface);border:1px solid var(--border);}
.ib-coll .ib-lbl{color:var(--muted);}
.start-big{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;color:var(--orange);}
.coll-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.coll-chip{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.79rem;padding:3px 10px;border-radius:20px;}
.geen{text-align:center;padding:40px 16px;}
.geen .icon{font-size:2.5rem;margin-bottom:10px;}
.geen h2{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--text);margin-bottom:6px;}
.geen p{color:var(--muted);font-size:.83rem;}

/* ════════════════════════════════════
   OVERZICHT TAB
════════════════════════════════════ */
.stat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;min-width:75px;display:flex;flex-direction:column;align-items:center;}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;color:var(--accent);line-height:1;}
.stat-l{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.ovz-card{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:8px;overflow:hidden;}
.ovz-head{background:linear-gradient(90deg,#1a2040,var(--card));padding:9px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ovz-code{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.15rem;color:var(--accent);}
.ovz-og{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#fff;}
.ovz-loc{font-size:.74rem;color:var(--muted);}
.ovz-body{padding:8px 12px;}
.uitv-chip{background:var(--pbg);border:1px solid var(--pb);color:var(--purple);font-size:.72rem;padding:2px 8px;border-radius:3px;display:inline-block;margin:2px;}
.werk-chip{background:var(--bbg);border:1px solid var(--bb);color:var(--blue);font-size:.72rem;padding:2px 8px;border-radius:3px;display:inline-block;margin:2px;}
.opm-strip{font-size:.76rem;color:#86efac;background:var(--gbg);border:1px solid var(--gb);padding:5px 8px;border-radius:5px;margin-top:5px;}

/* ════════════════════════════════════
   ADMIN TAB
════════════════════════════════════ */
.admin-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.admin-top h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;color:#fff;}
.datum-inp{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:.84rem;font-family:'Barlow',sans-serif;}

.share-box{background:var(--gbg);border:1px solid var(--gb);border-radius:9px;padding:11px 14px;margin-bottom:14px;}
.share-box-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;color:var(--green);margin-bottom:4px;}
.share-box p{font-size:.78rem;color:#86efac;line-height:1.5;margin-bottom:8px;}
.share-btns{display:flex;gap:6px;flex-wrap:wrap;}

.pac{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.pac-head{background:linear-gradient(90deg,#1a2040,var(--card));padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer;user-select:none;}
.pac-code{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.15rem;color:var(--accent);min-width:46px;}
.pac-og{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.92rem;color:#fff;}
.pac-loc{font-size:.73rem;color:var(--muted);flex:1;}
.pac-acts{margin-left:auto;display:flex;gap:5px;align-items:center;}
.pac-toggle{color:var(--muted);transition:transform .2s;font-size:.85rem;}
.pac.collapsed .pac-toggle{transform:rotate(-90deg);}
.pac-body{padding:10px 12px 14px;}
.pac.collapsed .pac-body{display:none;}

.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:9px;}
.fg label{font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.fg input,.fg select,.fg textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:.83rem;font-family:'Barlow',sans-serif;width:100%;}
.fg textarea{min-height:50px;resize:vertical;}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.persons-blk{margin-bottom:10px;}
.persons-title{font-family:'Barlow Condensed',sans-serif;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.persons-title.u{color:var(--purple);}
.persons-title.w{color:var(--blue);}

.pr{display:grid;grid-template-columns:1fr 90px auto;gap:5px;margin-bottom:5px;align-items:center;}
.pr input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:5px;font-size:.81rem;font-family:'Barlow',sans-serif;width:100%;}
.pr input.kt{text-transform:uppercase;letter-spacing:1.2px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.delbtn{width:28px;height:28px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:5px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.delbtn:hover{border-color:var(--red);color:var(--red);}
.add-p{background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:.73rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .15s;}
.add-p:hover{border-color:var(--accent);color:var(--accent);}

.add-proj-row{display:flex;justify-content:center;margin-top:8px;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:none;gap:8px;z-index:100;justify-content:center;}
.save-bar.visible{display:flex;}
</style>
</head>
<body>

<!-- LOGIN SCHERM (voor Hussein als admin) -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:8px;">🔐</div>
    <h2>Admin Login</h2>
    <p>Voer het wachtwoord in om het rooster te beheren</p>
    <input type="password" id="pw-input" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-error"></div>
    <button class="btn btn-accent" style="width:100%;justify-content:center;" onclick="doLogin()">Inloggen</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px;" onclick="closeLogin()">Annuleren</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">STIPT<em>.</em>TECHNIEK</div>
  <div class="topbar-right">
    <span id="admin-badge">⚙ ADMIN</span>
    <button id="logout-btn" onclick="logout()">Uitloggen</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs-bar">
  <button class="tab active" data-view="medewerker" onclick="setView('medewerker')">👷 Mijn Rooster</button>
  <button class="tab" data-view="overzicht" onclick="setView('overzicht')">📋 Overzicht</button>
  <button class="tab admin-only" data-view="admin" onclick="setView('admin')" style="display:none;">⚙ Admin</button>
</div>

<!-- ── MEDEWERKER VIEW ── -->
<div class="view active" id="view-medewerker">
  <!-- naam kiezen -->
  <div id="screen-naam">
    <div class="picker-wrap">
      <h1>Wie ben jij?</h1>
      <p id="picker-sub">Kies je naam om jouw rooster te zien</p>
      <div class="name-grid" id="name-grid"></div>
    </div>
  </div>
  <!-- eigen rooster -->
  <div id="screen-rooster" style="display:none;">
    <button class="back-btn" onclick="backToNames()">← Andere naam</button>
    <div class="datum-lbl" id="rooster-datum"></div>
    <div id="rooster-content"></div>
  </div>
</div>

<!-- ── OVERZICHT VIEW ── -->
<div class="view" id="view-overzicht">
  <div style="margin-bottom:12px;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;color:#fff;">Dagoverzicht</div>
    <div style="font-size:.76rem;color:var(--muted);" id="ovz-datum"></div>
  </div>
  <div class="stat-bar" id="ovz-stats"></div>
  <div id="ovz-lijst"></div>
</div>

<!-- ── ADMIN VIEW ── -->
<div class="view" id="view-admin">
  <div class="admin-top">
    <h2>Rooster beheren</h2>
    <input type="date" class="datum-inp" id="admin-datum" onchange="rooster.datum=this.value;">
  </div>

  <div class="share-box">
    <div class="share-box-title">📲 Delen met medewerkers</div>
    <p>1. Vul het rooster in &nbsp;2. Klik <strong>Opslaan</strong> &nbsp;3. Klik <strong>Deel link</strong> → plak in WhatsApp</p>
    <div class="share-btns">
      <button class="btn btn-accent btn-sm" onclick="opslaanRooster()">💾 Opslaan</button>
      <button class="btn btn-ghost btn-sm" onclick="deelLink()">🔗 Deel link</button>
      <button class="btn btn-ghost btn-sm" onclick="exportJSON()">📤 Exporteer backup</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('imp').click()">📥 Laad backup</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(this)">
    </div>
  </div>

  <div id="admin-projecten"></div>
  <div class="add-proj-row">
    <button class="btn btn-accent" onclick="addProject()">+ Nieuw project toevoegen</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════

function fmtDatum(s){
  if(!s) return '';
  const[y,m,d]=s.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return`${DAGEN[dt.getDay()]} ${d} ${MAANDEN[m-1]} ${y}`;
}
function todayStr(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

     uitv:[{n:'M. Pisniak',kt:'VJ254X',note:'1e werk'}],werk:[],
     opm:'Boren Botter 26-49-50 + Kempenaar 25 + 2x Ø130 Tjalk 56 tegels'},
    {code:'26054',type:'sloop',og:'via HH',loc:'Spoorweghaven 33, Rotterdam',start:'',
     uitv:[],werk:[{n:'Nassim',kt:'VKL61G',note:''},{n:'HH',kt:'',note:''}],
     opm:'Sloop KBT – Behangafstomer ophalen Loxam Rotterdam, Industrieweg 135'},
    {code:'DoeDag',type:'doedag',og:'Gemeente Den Haag',loc:'Meppelweg 339, Den Haag',start:'08:00',
     uitv:[{n:'H. Achahbar',kt:'V626LT',note:''}],
     werk:[{n:'O. Amhauan',kt:'',note:''}],opm:''},
  ]
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let rooster  = loadRooster();
let isAdmin  = false;
let activeView = 'medewerker';

function loadRooster(){
  // 1. URL param (gedeelde link)
  try{
    const p=new URLSearchParams(window.location.search).get('r');
    if(p) return JSON.parse(atob(decodeURIComponent(p)));
  }catch(e){}
  // 2. localStorage
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  // 3. demo
  return JSON.parse(JSON.stringify(DEMO));
}

// ══════════════════════════════════════════
// ADMIN LOGIN
// ══════════════════════════════════════════
function openLogin(){
  document.getElementById('login-screen').classList.add('open');
  document.getElementById('pw-input').value='';
  document.getElementById('login-error').textContent='';
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}
function closeLogin(){ document.getElementById('login-screen').classList.remove('open'); }

function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW){
    isAdmin = true;
    closeLogin();
    // Toon admin tab + badge
    document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
    document.getElementById('admin-badge').style.display='inline-block';
    document.getElementById('logout-btn').style.display='inline-block';
    setView('admin');
  } else {
    document.getElementById('login-error').textContent = '❌ Verkeerd wachtwoord';
  }
}

function logout(){
  isAdmin=false;
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');
  document.getElementById('admin-badge').style.display='none';
  document.getElementById('logout-btn').style.display='none';
  setView('medewerker');
}

// ══════════════════════════════════════════
// NAVIGATIE / TABS
// ══════════════════════════════════════════
function setView(v){
  activeView = v;
  // views
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('view-'+v);
  if(el) el.classList.add('active');
  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===v));
  // render
  if(v==='medewerker') renderNamen();
  if(v==='overzicht')  renderOverzicht();
  if(v==='admin')      renderAdmin();
}

// ══════════════════════════════════════════
// MEDEWERKER VIEW
// ══════════════════════════════════════════
function alleNamen(){
  const set=new Set();
  rooster.projecten.forEach(p=>[...p.uitv,...p.werk].forEach(m=>{
    if(m.n&&m.n.trim()&&m.n!=='HH') set.add(m.n.trim());
  }));
  return[...set].sort((a,b)=>a.split(' ').pop().localeCompare(b.split(' ').pop()));
}

function renderNamen(){
  document.getElementById('screen-naam').style.display='';
  document.getElementById('screen-rooster').style.display='none';
  document.getElementById('picker-sub').textContent = fmtDatum(rooster.datum)||'Kies je naam om jouw rooster te zien';

  const namen = alleNamen();
  let html = namen.map(n=>`<button class="name-btn" onclick="toonRooster(${JSON.stringify(n)})">👷 ${n}</button>`).join('');
  // Admin knop onderaan
  html += `<button class="name-btn admin-btn" onclick="openLogin()">🔐 Admin (Hussein)</button>`;
  document.getElementById('name-grid').innerHTML = html;
}

function toonRooster(naam){
  document.getElementById('screen-naam').style.display='none';
  document.getElementById('screen-rooster').style.display='block';
  document.getElementById('rooster-datum').textContent = fmtDatum(rooster.datum);

  const gevonden = rooster.projecten.filter(p=>
    p.uitv.find(u=>u.n===naam)||p.werk.find(w=>w.n===naam)
  );

  if(!gevonden.length){
    document.getElementById('rooster-content').innerHTML=`
      <div class="geen"><div class="icon">😴</div>
      <h2>Niet ingedeeld vandaag</h2>
      <p>Neem contact op met je uitvoerder als dit niet klopt.</p></div>`;
    return;
  }

  document.getElementById('rooster-content').innerHTML = gevonden.map(p=>{
    const isU = p.uitv.find(u=>u.n===naam);
    const zelf = isU || p.werk.find(w=>w.n===naam);
    const rol  = isU ? 'Uitvoerder / DTA' : 'Medewerker';
    const ibCls= isU ? 'ib-uitv' : 'ib-werk';
    const colls= [...p.uitv,...p.werk].filter(m=>m.n!==naam&&m.n!=='HH');

    return`<div class="eigen-card">
      <div class="ec-head">
        <div class="ec-row">
          <span class="ec-code">${p.code}</span>
          <span class="ec-og">${p.og}</span>
          <span class="tbadge t-${p.type}">${TLABEL[p.type]}</span>
          ${p.start?`<span style="background:var(--obg);border:1px solid var(--ob);color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;padding:2px 8px;border-radius:4px;">▶ ${p.start}</span>`:''}
        </div>
        <div class="ec-loc">📍 <strong>${p.loc}</strong></div>
      </div>
      <div class="ec-body">
        ${p.start?`<div class="ib ib-start"><div class="ib-lbl">Starttijd</div><div class="start-big">▶ ${p.start}</div></div>`:''}
        <div class="ib ${ibCls}">
          <div class="ib-lbl">${rol}</div>
          <div style="font-size:.94rem;font-weight:600;">${naam}${zelf.kt?`<span class="kt-tag">${zelf.kt}</span>`:''}${zelf.note?` <span style="color:var(--muted);font-size:.74rem;">(${zelf.note})</span>`:''}</div>
        </div>
        ${colls.length?`<div class="ib ib-coll"><div class="ib-lbl">Collega's vandaag</div>
          <div class="coll-list">${colls.map(c=>`<span class="coll-chip">${c.n}</span>`).join('')}</div></div>`:''}
        ${p.opm?`<div class="ib ib-opm"><div class="ib-lbl">⚠ Actie / Opmerking</div>
          <div style="font-size:.84rem;font-weight:600;color:#86efac;">${p.opm}</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function backToNames(){ renderNamen(); }

// ══════════════════════════════════════════
// OVERZICHT VIEW
// ══════════════════════════════════════════
function renderOverzicht(){
  document.getElementById('ovz-datum').textContent = fmtDatum(rooster.datum);

  const namen=new Set(), autos=new Set();
  rooster.projecten.forEach(p=>[...p.uitv,...p.werk].forEach(m=>{
    if(m.n&&m.n!=='HH') namen.add(m.n);
    if(m.kt) autos.add(m.kt);
  }));

  document.getElementById('ovz-stats').innerHTML=`
    <div class="stat"><span class="stat-n">${rooster.projecten.length}</span><span class="stat-l">Projecten</span></div>
    <div class="stat"><span class="stat-n">${namen.size}</span><span class="stat-l">Medewerkers</span></div>
    <div class="stat"><span class="stat-n">${autos.size}</span><span class="stat-l">Auto's</span></div>`;

  document.getElementById('ovz-lijst').innerHTML = rooster.projecten.map(p=>`
    <div class="ovz-card">
      <div class="ovz-head">
        <span class="ovz-code">${p.code}</span>
        <span class="ovz-og">${p.og}</span>
        <span class="tbadge t-${p.type}">${TLABEL[p.type]}</span>
        ${p.start?`<span style="background:var(--obg);border:1px solid var(--ob);color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;padding:1px 7px;border-radius:4px;">▶ ${p.start}</span>`:''}
        <span class="ovz-loc">📍 ${p.loc}</span>
      </div>
      <div class="ovz-body">
        ${p.uitv.length?`<div style="margin-bottom:4px;">${p.uitv.map(u=>`<span class="uitv-chip">🔑 ${u.n}${u.kt?` · ${u.kt}`:''}${u.note?` (${u.note})`:''}</span>`).join('')}</div>`:''}
        ${p.werk.length?`<div style="margin-bottom:4px;">${p.werk.map(w=>`<span class="werk-chip">👷 ${w.n}${w.kt?` · ${w.kt}`:''}${w.note?` (${w.note})`:''}</span>`).join('')}</div>`:''}
        ${p.opm?`<div class="opm-strip">⚠ ${p.opm}</div>`:''}
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════
// ADMIN VIEW
// ══════════════════════════════════════════
function renderAdmin(){
  document.getElementById('admin-datum').value = rooster.datum||todayStr();
  document.getElementById('admin-projecten').innerHTML = rooster.projecten.map((p,i)=>buildPac(p,i)).join('');
}

function buildPac(p,i){
  return`<div class="pac" id="pac-${i}">
    <div class="pac-head" onclick="togglePac(${i})">
      <span class="pac-code" id="pcode-${i}">${p.code||'—'}</span>
      <span class="pac-og"   id="pog-${i}">${p.og||'Opdrachtgever'}</span>
      <span class="tbadge t-${p.type}" id="ptype-${i}">${TLABEL[p.type]}</span>
      <span class="pac-loc"  id="ploc-${i}">${p.loc||''}</span>
      <div class="pac-acts" onclick="event.stopPropagation()">
        <button class="btn-danger" onclick="delProject(${i})">✕ Verwijder</button>
        <span class="pac-toggle">▾</span>
      </div>
    </div>
    <div class="pac-body">
      <div class="fg-2">
        <div class="fg"><label>Projectcode</label>
          <input value="${esc(p.code)}" placeholder="bijv. 25006"
            oninput="rooster.projecten[${i}].code=this.value;document.getElementById('pcode-${i}').textContent=this.value||'—'">
        </div>
        <div class="fg"><label>Type</label>
          <select onchange="rooster.projecten[${i}].type=this.value;document.getElementById('ptype-${i}').className='tbadge t-'+this.value;document.getElementById('ptype-${i}').textContent={asbest:'Asbest',sloop:'Sloop',doedag:'DoeDag'}[this.value]">
            <option value="asbest" ${p.type==='asbest'?'selected':''}>Asbest</option>
            <option value="sloop"  ${p.type==='sloop' ?'selected':''}>Sloop</option>
            <option value="doedag" ${p.type==='doedag'?'selected':''}>DoeDag</option>
          </select>
        </div>
      </div>
      <div class="fg-2">
        <div class="fg"><label>Opdrachtgever</label>
          <input value="${esc(p.og)}" placeholder="ERA Contour"
            oninput="rooster.projecten[${i}].og=this.value;document.getElementById('pog-${i}').textContent=this.value||'Opdrachtgever'">
        </div>
        <div class="fg"><label>Starttijd</label>
          <input type="time" value="${p.start||''}" onchange="rooster.projecten[${i}].start=this.value">
        </div>
      </div>
      <div class="fg"><label>Locatie</label>
        <input value="${esc(p.loc)}" placeholder="Straat, Stad"
          oninput="rooster.projecten[${i}].loc=this.value;document.getElementById('ploc-${i}').textContent=this.value">
      </div>

      <div class="persons-blk">
        <div class="persons-title u">Uitvoerders / DTA's
          <button class="add-p" onclick="addPerson(${i},'uitv')">+ Toevoegen</button>
        </div>
        <div id="uitv-${i}">${p.uitv.map((u,j)=>pRow(i,'uitv',j,u)).join('')}</div>
      </div>

      <div class="persons-blk">
        <div class="persons-title w">Medewerkers
          <button class="add-p" onclick="addPerson(${i},'werk')">+ Toevoegen</button>
        </div>
        <div id="werk-${i}">${p.werk.map((w,j)=>pRow(i,'werk',j,w)).join('')}</div>
      </div>

      <div class="fg"><label>Opmerking / Actie</label>
        <textarea oninput="rooster.projecten[${i}].opm=this.value">${esc(p.opm)}</textarea>
      </div>
    </div>
  </div>`;
}

function pRow(pi,field,ji,d){
  return`<div class="pr" id="pr-${pi}-${field}-${ji}">
    <input value="${esc(d.n)}" placeholder="Naam"
      oninput="rooster.projecten[${pi}].${field}[${ji}].n=this.value">
    <input class="kt" value="${esc(d.kt)}" placeholder="Kenteken" maxlength="8"
      oninput="rooster.projecten[${pi}].${field}[${ji}].kt=this.value.toUpperCase()">
    <button class="delbtn" onclick="delPerson(${pi},'${field}',${ji})">✕</button>
  </div>`;
}

function esc(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function togglePac(i){ document.getElementById('pac-'+i).classList.toggle('collapsed'); }

function addPerson(pi,field){
  rooster.projecten[pi][field].push({n:'',kt:'',note:''});
  const ji=rooster.projecten[pi][field].length-1;
  const c=document.getElementById(`${field}-${pi}`);
  const div=document.createElement('div');
  div.innerHTML=pRow(pi,field,ji,{n:'',kt:'',note:''});
  c.appendChild(div.firstElementChild);
}

function delPerson(pi,field,ji){
  rooster.projecten[pi][field].splice(ji,1);
  document.getElementById(`${field}-${pi}`).innerHTML=
    rooster.projecten[pi][field].map((p,j)=>pRow(pi,field,j,p)).join('');
}

function addProject(){
  rooster.projecten.push({code:'',type:'asbest',og:'',loc:'',start:'',
    uitv:[{n:'',kt:'',note:''}],werk:[],opm:''});
  const i=rooster.projecten.length-1;
  const c=document.getElementById('admin-projecten');
  const div=document.createElement('div');
  div.innerHTML=buildPac(rooster.projecten[i],i);
  c.appendChild(div.firstElementChild);
  setTimeout(()=>c.lastElementChild.scrollIntoView({behavior:'smooth'}),60);
}

function delProject(i){
  if(!confirm('Project verwijderen?')) return;
  rooster.projecten.splice(i,1);
  renderAdmin();
}

// ══════════════════════════════════════════
// OPSLAAN / DELEN
// ══════════════════════════════════════════
function opslaanRooster(){
  rooster.datum = document.getElementById('admin-datum').value || rooster.datum;
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(rooster)); }catch(e){}
  renderOverzicht();
  renderNamen();
  alert('✅ Rooster opgeslagen!');
}

function deelLink(){
  try{
    const encoded = encodeURIComponent(btoa(JSON.stringify(rooster)));
    const url = window.location.origin + window.location.pathname + '?r=' + encoded;
    if(navigator.share){
      navigator.share({title:'Stipt Techniek Rooster', text:'Jouw rooster voor '+fmtDatum(rooster.datum), url});
    } else {
      navigator.clipboard.writeText(url)
        .then(()=>alert('✅ Link gekopieerd!\n\nPlak hem in de WhatsApp groep.\nMedewerkers tikken op hun naam en zien alleen hun eigen rooster.'))
        .catch(()=>prompt('Kopieer deze link en stuur naar WhatsApp:', url));
    }
  }catch(e){ alert('Sla het rooster eerst op!'); }
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(rooster,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`rooster-${rooster.datum||'backup'}.json`;
  a.click();
}

function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      rooster=JSON.parse(e.target.result);
      localStorage.setItem(STORAGE_KEY,JSON.stringify(rooster));
      renderAdmin(); renderOverzicht(); renderNamen();
      alert('✅ Backup ingeladen!');
    }catch(err){ alert('Ongeldig bestand'); }
  };
  reader.readAsText(file);
  input.value='';
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderNamen();
</script>
